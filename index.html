<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LyricForge · AI 歌詞生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050508;
      --surface: #0d0d14;
      --card: #12121e;
      --border: #1e1e30;
      --accent: #c8ff00;
      --accent2: #ff3cac;
      --accent3: #00d4ff;
      --text: #e8e8f0;
      --muted: #6060880;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Noto Sans TC', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent2); top: -150px; right: -100px; animation: drift 18s ease-in-out infinite alternate; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent3); bottom: -100px; left: -80px; animation: drift 22s ease-in-out infinite alternate-reverse; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 50%; transform: translateX(-50%); animation: drift 15s ease-in-out infinite alternate; }

    @keyframes drift {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(40px) scale(1.08); }
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.8s ease both;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 4px 16px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .logo-badge span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.4s step-end infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(64px, 12vw, 110px);
      line-height: 0.9;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 24px;
      animation: fadeUp 0.8s ease both;
      backdrop-filter: blur(8px);
    }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── API Key input ── */
    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-wrap {
      position: relative;
      flex: 1;
    }

    input[type="text"], input[type="password"], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,255,0,0.08);
    }

    select option { background: var(--surface); }

    textarea { resize: vertical; min-height: 90px; line-height: 1.6; font-family: var(--font-body); font-size: 14px; }

    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-vis:hover { color: var(--accent); }
    input[type="password"] { padding-right: 44px; }

    /* ── Grid fields ── */
    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media(max-width:560px){ .fields-grid { grid-template-columns: 1fr; } }

    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-group label { font-size: 12px; color: #777; letter-spacing: 0.05em; }

    /* ── Mood pills ── */
    .mood-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    .mood-pill {
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: #888;
      background: transparent;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .mood-pill:hover { border-color: var(--accent); color: var(--accent); }
    .mood-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

    /* ── Prompt ── */
    .prompt-wrap { margin-bottom: 8px; }

    .char-count { font-size: 11px; color: #555; text-align: right; margin-top: 6px; font-family: var(--font-mono); }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 0.08em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,255,0,0.25);
    }
    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-generate .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
      transform: translateX(-100%);
    }
    .btn-generate:hover .shimmer { animation: shimmer 0.6s ease forwards; }
    @keyframes shimmer { to { transform: translateX(200%); } }

    /* ── Output ── */
    #output-card { display: none; }
    #output-card.visible { display: block; animation: fadeUp 0.5s ease both; }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .output-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 11px;
      font-family: var(--font-mono);
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(200,255,0,0.1);
      color: var(--accent);
      border: 1px solid rgba(200,255,0,0.2);
    }
    .tag.pink { background: rgba(255,60,172,0.1); color: var(--accent2); border-color: rgba(255,60,172,0.2); }
    .tag.blue { background: rgba(0,212,255,0.1); color: var(--accent3); border-color: rgba(0,212,255,0.2); }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: #888;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { border-color: var(--accent); color: var(--accent); }

    .lyrics-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 2;
      white-space: pre-wrap;
      color: #d0d0e8;
      min-height: 200px;
      position: relative;
    }

    .lyrics-display .section-tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* ── Loading state ── */
    .loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(5,5,8,0.85);
      border-radius: 12px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(4px);
    }
    .loading-overlay.active { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: rgba(255,60,172,0.08);
      border: 1px solid rgba(255,60,172,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--accent2);
      margin-top: 12px;
      font-family: var(--font-mono);
    }
    .error-msg.visible { display: block; }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 60px;
      color: #333;
      font-size: 12px;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="wrapper">
    <!-- Header -->
    <header>
      <div class="logo-badge"><span></span> AI POWERED</div>
      <h1>LYRIC<br>FORGE</h1>
      <p class="subtitle">用人工智慧，鍛造你的每一首歌</p>
    </header>

    <!-- API Key -->
    <div class="card">
      <div class="card-label">API 金鑰設定</div>
      <div class="api-row">
        <div class="input-wrap">
          <input type="password" id="apiKey" placeholder="貼上你的 Anthropic API Key（sk-ant-...）" autocomplete="off" />
          <button class="toggle-vis" onclick="toggleApiVis()" title="顯示/隱藏">👁</button>
        </div>
      </div>
      <p style="font-size:11px;color:#444;margin-top:10px;font-family:var(--font-mono);">
        金鑰僅存於瀏覽器，不會上傳任何伺服器。
        <a href="https://console.anthropic.com/account/keys" target="_blank" style="color:#666;text-decoration:underline;">取得 API Key →</a>
      </p>
    </div>

    <!-- Controls -->
    <div class="card">
      <div class="card-label">歌曲設定</div>

      <div class="fields-grid">
        <div class="field-group">
          <label>語言</label>
          <select id="lang">
            <option value="zh-TW">繁體中文</option>
            <option value="zh-CN">簡體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="mixed">中英混搭</option>
          </select>
        </div>
        <div class="field-group">
          <label>曲風</label>
          <select id="genre">
            <option value="pop">流行 Pop</option>
            <option value="rnb">R&B / Soul</option>
            <option value="hiphop">嘻哈 Hip-hop</option>
            <option value="rock">搖滾 Rock</option>
            <option value="ballad">抒情 Ballad</option>
            <option value="edm">EDM / Electronic</option>
            <option value="folk">民謠 Folk</option>
            <option value="jazz">爵士 Jazz</option>
          </select>
        </div>
        <div class="field-group">
          <label>段落結構</label>
          <select id="structure">
            <option value="verse-chorus">主歌 + 副歌</option>
            <option value="verse-prechorus-chorus">主歌 + 預副歌 + 副歌</option>
            <option value="verse-chorus-bridge">主歌 + 副歌 + 橋段</option>
            <option value="full">完整結構（含所有段落）</option>
          </select>
        </div>
        <div class="field-group">
          <label>創意程度</label>
          <select id="temperature">
            <option value="0.6">穩定保守</option>
            <option value="0.85" selected>平衡</option>
            <option value="1.0">大膽創意</option>
          </select>
        </div>
      </div>

      <div class="field-group" style="margin-bottom:16px;">
        <label>情緒氛圍（可多選）</label>
        <div class="mood-row">
          <button class="mood-pill" onclick="toggleMood(this)">💔 心碎</button>
          <button class="mood-pill active" onclick="toggleMood(this)">✨ 希望</button>
          <button class="mood-pill" onclick="toggleMood(this)">🔥 熱血</button>
          <button class="mood-pill" onclick="toggleMood(this)">🌙 思念</button>
          <button class="mood-pill" onclick="toggleMood(this)">🎉 快樂</button>
          <button class="mood-pill" onclick="toggleMood(this)">😤 憤怒</button>
          <button class="mood-pill" onclick="toggleMood(this)">🌊 平靜</button>
          <button class="mood-pill" onclick="toggleMood(this)">💫 夢幻</button>
          <button class="mood-pill" onclick="toggleMood(this)">🌧 憂鬱</button>
          <button class="mood-pill" onclick="toggleMood(this)">💪 勵志</button>
        </div>
      </div>

      <div class="field-group prompt-wrap">
        <label>主題描述（選填，越詳細越好）</label>
        <textarea id="prompt" placeholder="例：關於一段異地戀，兩個人因為距離漸漸疏遠，但心裡仍然放不下對方..." oninput="updateChar()"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 500</div>
      </div>

      <button class="btn-generate" onclick="generate()" id="genBtn">
        <div class="shimmer"></div>
        ⚡ 生成歌詞
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Output -->
    <div class="card" id="output-card">
      <div class="output-header">
        <div class="output-meta">
          <span class="tag" id="tagLang"></span>
          <span class="tag pink" id="tagGenre"></span>
          <span class="tag blue" id="tagMood"></span>
        </div>
        <button class="btn-copy" id="copyBtn" onclick="copyLyrics()">
          📋 複製歌詞
        </button>
      </div>
      <div class="lyrics-display" id="lyricsDisplay">
        <div class="loading-overlay active" id="loadingOverlay">
          <div class="spinner"></div>
          <div class="loading-text">GENERATING LYRICS...</div>
        </div>
      </div>
    </div>

    <footer>
      Built with Claude API &nbsp;·&nbsp;
      <a href="https://console.anthropic.com" target="_blank">Anthropic Console</a>
    </footer>
  </div>

  <script>
    // ── Mood selection ──
    function toggleMood(el) {
      el.classList.toggle('active');
    }

    function getSelectedMoods() {
      return [...document.querySelectorAll('.mood-pill.active')].map(el => el.textContent.trim());
    }

    // ── Char count ──
    function updateChar() {
      const len = document.getElementById('prompt').value.length;
      document.getElementById('charCount').textContent = len;
    }

    // ── API key visibility ──
    function toggleApiVis() {
      const input = document.getElementById('apiKey');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // ── Copy lyrics ──
    function copyLyrics() {
      const text = document.getElementById('lyricsDisplay').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ 已複製！';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋 複製歌詞';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // ── Genre label map ──
    const genreLabels = {
      pop:'流行 Pop', rnb:'R&B / Soul', hiphop:'嘻哈 Hip-hop',
      rock:'搖滾 Rock', ballad:'抒情 Ballad', edm:'EDM / Electronic',
      folk:'民謠 Folk', jazz:'爵士 Jazz'
    };
    const langLabels = {
      'zh-TW':'繁體中文', 'zh-CN':'簡體中文', 'en':'English',
      'ja':'日本語', 'mixed':'中英混搭'
    };
    const structureLabels = {
      'verse-chorus':'主歌 + 副歌',
      'verse-prechorus-chorus':'主歌 + 預副歌 + 副歌',
      'verse-chorus-bridge':'主歌 + 副歌 + 橋段',
      'full':'完整結構'
    };

    // ── Main generate function ──
    async function generate() {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) { showError('請先輸入 Anthropic API Key！'); return; }

      const lang = document.getElementById('lang').value;
      const genre = document.getElementById('genre').value;
      const structure = document.getElementById('structure').value;
      const temp = parseFloat(document.getElementById('temperature').value);
      const prompt = document.getElementById('prompt').value.trim();
      const moods = getSelectedMoods();

      // Show output card + loading
      const outputCard = document.getElementById('output-card');
      outputCard.classList.add('visible');
      document.getElementById('lyricsDisplay').innerHTML = '<div class="loading-overlay active" id="loadingOverlay"><div class="spinner"></div><div class="loading-text">GENERATING LYRICS...</div></div>';
      document.getElementById('genBtn').disabled = true;
      hideError();

      // Update tags
      document.getElementById('tagLang').textContent = langLabels[lang];
      document.getElementById('tagGenre').textContent = genreLabels[genre];
      document.getElementById('tagMood').textContent = moods.length ? moods.join(' ') : '無指定情緒';

      // Build prompt
      const systemPrompt = `你是一位頂尖的詞曲創作人，擅長撰寫各種風格的歌詞。
你的歌詞富有詩意、情感真實、意象鮮明，並且符合音樂的節奏感與韻腳。
請根據使用者的需求生成完整歌詞，使用繁體中文標示段落名稱（如【主歌一】【副歌】【橋段】）。`;

      const moodStr = moods.length ? `情緒氛圍：${moods.join('、')}` : '';
      const themeStr = prompt ? `主題內容：${prompt}` : '（無特定主題，請自由發揮）';

      const userPrompt = `請幫我創作一首歌詞，條件如下：
- 語言：${langLabels[lang]}
- 曲風：${genreLabels[genre]}
- 段落結構：${structureLabels[structure]}
${moodStr}
- ${themeStr}

請用【段落名稱】標示每個段落，並讓歌詞具有押韻感和流暢的節奏。`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1500,
            temperature: temp,
            system: systemPrompt,
            messages: [{ role: 'user', content: userPrompt }]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || `API 錯誤 ${response.status}`);
        }

        const lyrics = data.content?.[0]?.text || '';
        renderLyrics(lyrics);

      } catch (err) {
        document.getElementById('lyricsDisplay').innerHTML = '';
        showError('❌ ' + (err.message || '發生未知錯誤，請確認 API Key 是否正確'));
      } finally {
        document.getElementById('genBtn').disabled = false;
      }
    }

    function renderLyrics(text) {
      // Animate in line by line
      const display = document.getElementById('lyricsDisplay');
      display.innerHTML = '';

      const lines = text.split('\n');
      let html = '';
      for (const line of lines) {
        if (line.match(/^【.+】$/)) {
          html += `\n<span class="section-tag">${line}</span>\n`;
        } else {
          html += line + '\n';
        }
      }
      display.innerHTML = html;

      // Scroll into view
      display.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }
  </script>
</body>
</html>
